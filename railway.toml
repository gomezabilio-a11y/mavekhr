# ─────────────────────────────────────────────────────────────────────────────
# MAVEK HR Portal — Railway Configuration
# https://docs.railway.com/reference/config-as-code
# ─────────────────────────────────────────────────────────────────────────────

[build]
# Use the custom Dockerfile at the project root
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Number of replicas (1 for standard; increase for high availability)
numReplicas = 1

# Health check: Railway pings this endpoint to confirm the service is healthy
# The Express server responds to GET / with the SPA shell (200 OK)
healthcheckPath = "/healthz"
healthcheckTimeout = 60

# Restart policy: restart on failure, up to 10 times
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
